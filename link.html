<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links & Resources | JTV Explaiz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CSS VARIABLES (Matching your Liquid Glass Theme) --- */
        :root {
            --bg-gradient: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --text-dark: #2c3e50;
            --text-light: #546e7a;
            --primary-color: #007aff;
            --water-blue: #e3f2fd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- BACKGROUND BUBBLES --- */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            filter: blur(40px);
            z-index: -1;
            animation: float 8s infinite ease-in-out;
        }
        .b1 { width: 300px; height: 300px; top: -50px; left: -50px; }
        .b2 { width: 400px; height: 400px; bottom: 10%; right: -100px; animation-delay: 2s; background: rgba(142, 197, 252, 0.4); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- NAVIGATION --- */
        .glass-nav {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .nav-logo { width: 35px; height: 35px; border-radius: 50%; background: #fff; }
        .channel-name { font-weight: 600; font-size: 1.1rem; }

        /* --- LINKS CONTAINER --- */
        .links-section {
            flex: 1;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-box {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-box h1 { font-size: 2.2rem; margin-bottom: 10px; color: var(--text-dark); }

        .links-grid {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* --- GLASS STRIP STYLE --- */
        .glass-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            padding: 18px 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: var(--glass-shadow);
        }

        .glass-strip:hover {
            background: rgba(255, 255, 255, 0.65);
            transform: scale(1.02);
            border-color: var(--primary-color);
        }

        .strip-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            font-size: 1.05rem;
        }

        .strip-info i {
            font-size: 1.4rem;
            width: 30px;
            text-align: center;
            color: var(--primary-color);
        }

        .download-badge {
            background: var(--primary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .arrow-icon {
            font-size: 1.1rem;
            opacity: 0.6;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 480px) {
            .header-box h1 { font-size: 1.8rem; }
            .glass-strip { padding: 15px 20px; }
            .strip-info { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="bubble b1"></div>
    <div class="bubble b2"></div>

    <nav class="glass-nav">
        <div class="nav-content">
            <a href="index.html" class="logo-area">
                <img src="https://image2url.com/r2/default/images/1771340676429-29f202be-7ec9-4180-81f8-2a8923e79ede.jpg" alt="Logo" class="nav-logo">
                <span class="channel-name">JTV Explaiz</span>
            </a>
            <a href="index.html" style="text-decoration: none; color: var(--primary-color); font-weight: 500;">
                <i class="fa-solid fa-house"></i> Back
            </a>
        </div>
    </nav>

    <main class="links-section">
        <div class="header-box">
            <h1>Resources & Links</h1>
            <p>Download project files and stay connected.</p>
        </div>

        <div class="links-grid">
            
            <a href="https://drive.google.com/file/d/1XIheWJWFLZXQY3m6ita-eUnATie4ZAJt/view?usp=drivesdk" download class="glass-strip">
                <div class="strip-info">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Portfolio source code (Zip)</span>
                </div>
                <span class="download-badge">Download</span>
            </a>

            <a href="#" target="_blank" class="glass-strip">
                <div class="strip-info">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Disable</span>
                </div>
                <span class="download-badge">Download</span>
            </a>

            <a href="#" target="_blank" class="glass-strip">
                <div class="strip-info">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Disable</span>
                </div>
                <span class="download-badge">Download</span>
            </a>

            <a href="#" target="_blank" class="glass-strip">
                <div class="strip-info">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Disable</span>
                </div>
                <span class="download-badge">Download</span>
            </a>

            <a href="#" class="glass-strip">
                <div class="strip-info">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Disable</span>
                </div>
                <span class="download-badge">Download</span> 
            </a>

            <a href="#" target="_blank" class="glass-strip">
                <div class="strip-info">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Disable</span>
                </div>
                <span class="download-badge">Download</span>
            </a>

        </div>
    </main>

    <footer>
        <p>&copy; 2025 JTV Explaiz | Made with Liquid Glass UI</p>
    </footer>

    <script>
        // Smooth entry animation for links
        document.addEventListener('DOMContentLoaded', () => {
            const strips = document.querySelectorAll('.glass-strip');
            strips.forEach((strip, index) => {
                strip.style.opacity = '0';
                strip.style.transform = 'translateY(20px)';
                strip.style.transition = 'all 0.4s ease forwards';
                
                setTimeout(() => {
                    strip.style.opacity = '1';
                    strip.style.transform = 'translateY(0)';
                }, 100 * (index + 1));
            });
        });
    </script>
</body>
</html>
